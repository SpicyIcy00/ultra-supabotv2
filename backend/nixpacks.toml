[phases.setup]
nixPkgs = ["python311", "postgresql", "gcc"]

[phases.install]
cmds = ["pip install --no-cache-dir --upgrade pip && pip install --no-cache-dir numpy pandas && pip install --no-cache-dir -r requirements.txt"]

[start]
cmd = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
